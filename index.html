<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player</title>

  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

  <script>
    window.alert = function () { return true; };
    window.adConfig = {};
    window.unityInstance = null;

    setInterval(() => {
      if (window.unityInstance?.SendMessage) {
        window.unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainApproved');
      }
    }, 100);
  </script>

  <style>
    body {
      margin: 0;
      background-color: #232323;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      background: #000;
      display: block;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .credit-text {
      color: #ffffff;
      font-size: 38px;
      font-family: "Jersey 10", sans-serif;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div class="credit-text">Ported by CoreScripts</div>
      <div style="margin-top: 10px; font-size: 15px; color: #cccccc;">
        Be patient, first startup may be slower
      </div>
      <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const container = document.querySelector("#unity-container");

    const buildUrl = "Build";

    const config = {
      dataUrl: `${buildUrl}/EBS.data`,
      frameworkUrl: `${buildUrl}/EBS.framework.js`,
      codeUrl: `${buildUrl}/EBS.wasm`,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "madkidgames.com",
      productName: "Epic Battle Simulator 2",
      productVersion: "1.11.4",
    };

    const script = document.createElement("script");
    script.src = `${buildUrl}/EBS.loader.js`;

    script.onload = () => {
      createUnityInstance(canvas, config, () => {})
        .then((instance) => {
          window.unityInstance = instance;
          if (loadingBar) loadingBar.style.display = "none";
        })
        .catch(() => {});
    };

    document.body.appendChild(script);

    function resize() {
      const aspect = 16 / 9;

      let w = window.innerWidth;
      let h = w / aspect;

      if (h > window.innerHeight) {
        h = window.innerHeight;
        w = h * aspect;
      }

      canvas.style.width = w + "px";
      canvas.style.height = h + "px";

      container.style.width = w + "px";
      container.style.height = h + "px";
    }

    window.addEventListener('load', resize);
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
